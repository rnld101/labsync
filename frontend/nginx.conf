server {
    listen 80;

    # --- API routing to backend services ---
    # report-service handles /api/v1/reports/...
    location ~ ^/api/v1/reports {
        proxy_pass         http://report-service:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }

    # appointment-service handles everything else under /api/v1/
    location /api/v1/ {
        proxy_pass         http://appointment-service:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }

    # Direct health check pass-throughs
    location /health/appointment {
        proxy_pass http://appointment-service:8000/healthz;
    }
    location /health/report {
        proxy_pass http://report-service:8000/healthz;
    }
    location /health/notification {
        proxy_pass http://notification-service:8000/healthz;
    }

    # --- Static frontend (SPA) ---
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
