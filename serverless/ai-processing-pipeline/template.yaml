AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: LabLumen AI processing pipeline (S3 -> Textract -> Bedrock -> pgvector)

# Self-contained path for `sam build` / `sam deploy`. In the Terraform-managed deployment, the
# reports bucket and the S3 -> Lambda notification are provisioned by terraform/modules/storage
# instead; this template then only needs the function + VpcConfig to reach RDS.

Parameters:
  DatabaseUrl:
    Type: String
    NoEcho: true
    Description: libpq/SQLAlchemy URL for the RDS Postgres instance.

Globals:
  Function:
    Runtime: python3.12
    Timeout: 60
    MemorySize: 512

Resources:
  ReportsBucket:
    Type: AWS::S3::Bucket
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  AiProcessingFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: src.handler.lambda_handler
      Environment:
        Variables:
          DATABASE_URL: !Ref DatabaseUrl
          BEDROCK_EMBED_MODEL_ID: amazon.titan-embed-text-v1
          BEDROCK_TEXT_MODEL_ID: amazon.nova-2-lite-v1:0
      # VpcConfig:  # required to reach RDS in private subnets (wired from Terraform outputs)
      #   SubnetIds: [...]
      #   SecurityGroupIds: [...]
      Policies:
        - TextractPolicy: {}
        - S3ReadPolicy:
            BucketName: !Ref ReportsBucket
        - Statement:
            - Effect: Allow
              Action: ["bedrock:InvokeModel"]
              Resource: "*"
      Events:
        ReportUploaded:
          Type: S3
          Properties:
            Bucket: !Ref ReportsBucket
            Events: s3:ObjectCreated:*

Outputs:
  FunctionArn:
    Value: !GetAtt AiProcessingFunction.Arn
  ReportsBucketName:
    Value: !Ref ReportsBucket
