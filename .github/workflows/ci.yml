name: ci

on:
  pull_request:
    paths:
      - "backend/**"
      - "serverless/**"

jobs:
  lint-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [appointment-service, report-service, notification-service]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r backend/${{ matrix.service }}/requirements-dev.txt

      - name: Ruff
        run: ruff check backend/${{ matrix.service }}

      - name: Pytest (smoke)
        working-directory: backend/${{ matrix.service }}
        run: python -m pytest -q
