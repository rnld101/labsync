name: build-push-ecr

# Builds the three service images, pushes to ECR, then bumps the image tags in the Helm values
# (GitOps). ArgoCD auto-syncs the new tags. The values bump touches only k8s/**, which is excluded
# from this trigger, so it does not loop.
on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/build-push-ecr.yml"

permissions:
  id-token: write # OIDC federation to AWS
  contents: write # push the GitOps tag bump

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 130290476321.dkr.ecr.us-east-1.amazonaws.com

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::130290476321:role/lablumen-gh-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, push, and bump tags
        run: |
          set -euo pipefail
          TAG="${GITHUB_SHA::7}"
          for svc in appointment-service report-service notification-service; do
            image="$ECR_REGISTRY/lablumen/$svc"
            docker build -t "$image:$TAG" -t "$image:latest" "backend/$svc"
            docker push "$image:$TAG"
            docker push "$image:latest"
            sed -i "s/^\(  tag:\).*/\1 \"$TAG\"/" "k8s/apps/$svc/values.yaml"
          done

      - name: Commit GitOps tag bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet -- k8s; then
            git add k8s/apps/*/values.yaml
            git commit -m "ci: bump image tags to ${GITHUB_SHA::7}"
            git push
          fi
