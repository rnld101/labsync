# LabLumen — single-EC2 docker compose stack.
# nginx (port 80) serves the frontend and reverse-proxies /api/v1/ to the backend services.
# Postgres + Redis run locally in the compose network — no RDS needed.
name: lablumen

x-service-env: &service-env
  DATABASE_URL: postgresql+asyncpg://lablumen:lablumen@postgres:5432/lablumen
  REDIS_URL: redis://redis:6379/0
  AWS_REGION: us-east-1
  COGNITO_USER_POOL_ID: us-east-1_3hMVOZPch
  COGNITO_APP_CLIENT_ID: 7eb2d3esnbfs3te482jgsfqp6t
  BEDROCK_EMBED_MODEL_ID: amazon.titan-embed-text-v1
  # Nova Lite (v1) supports on-demand natively in us-east-1. Nova 2 Lite is inference-profile-only,
  # and those profiles load-balance cross-region — blocked here by an org SCP that allows only
  # us-east-1. So we use the in-region on-demand Nova Lite model.
  BEDROCK_TEXT_MODEL_ID: amazon.nova-lite-v1:0
  # Allow all origins — browser calls never leave nginx (same-origin), but this keeps
  # direct curl / Postman calls against :8001-8003 working too.
  CORS_ORIGINS: '["*"]'

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: lablumen
      POSTGRES_PASSWORD: lablumen
      POSTGRES_DB: lablumen
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lablumen -d lablumen"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    build: ./backend/appointment-service
    command: alembic upgrade head
    environment:
      <<: *service-env
    depends_on:
      postgres:
        condition: service_healthy

  appointment-service:
    build: ./backend/appointment-service
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment:
      <<: *service-env
      NOTIFICATIONS_QUEUE_URL: https://sqs.us-east-1.amazonaws.com/130290476321/lablumen-notifications
    ports:
      - "8001:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  report-service:
    build: ./backend/report-service
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment:
      <<: *service-env
      REPORTS_S3_BUCKET: lablumen-reports-130290476321
      PRESIGNED_URL_TTL_SECONDS: "120"
    ports:
      - "8002:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  notification-service:
    build: ./backend/notification-service
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment:
      <<: *service-env
      NOTIFICATIONS_QUEUE_URL: https://sqs.us-east-1.amazonaws.com/130290476321/lablumen-notifications
      SES_SENDER_EMAIL: rukesully@gmail.com
    ports:
      - "8003:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_APPOINTMENT_API: ""
        VITE_REPORT_API: ""
        VITE_COGNITO_USER_POOL_ID: us-east-1_3hMVOZPch
        VITE_COGNITO_APP_CLIENT_ID: 7eb2d3esnbfs3te482jgsfqp6t
        VITE_COGNITO_DOMAIN: https://lablumen-users.auth.us-east-1.amazoncognito.com
    ports:
      - "80:80"
    depends_on:
      - appointment-service
      - report-service
      - notification-service

volumes:
  pgdata:
