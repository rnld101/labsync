# Secrets Store CSI driver: mounts AWS Secrets Manager secrets into pods (the *-secrets envs).
# NOTE: also install the AWS provider DaemonSet
# (secrets-store-csi-driver-provider-aws) alongside this driver.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: secrets-store-csi-driver
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://kubernetes-sigs.github.io/secrets-store-csi-driver/charts
    chart: secrets-store-csi-driver
    targetRevision: 1.4.6
    helm:
      values: |
        syncSecret:
          enabled: true
        enableSecretRotation: true
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
